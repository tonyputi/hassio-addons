map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 42617;

    location / {
        proxy_pass         http://127.0.0.1:42618;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;

        # Rewrite absolute asset paths to relative so the browser fetches
        # them through the HA ingress proxy instead of the HA root.
        sub_filter           '="/_app/' '="./_app/';
        sub_filter_once      off;
        sub_filter_types     text/html;
    }
}
