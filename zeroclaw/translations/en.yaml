configuration:
  timezone:
    name: "Timezone"
    description: "Timezone for cron scheduling. Use IANA format, e.g. Europe/Rome, America/New_York, Asia/Tokyo."
  ha_mcp_enabled:
    name: "Enable Home Assistant MCP"
    description: "Allow the AI agent to read and control Home Assistant entities (lights, sensors, automations) via MCP."
  gateway_pairing:
    name: "Require Dashboard Pairing"
    description: "When enabled, the web dashboard requires a one-time pairing code on first access. Disable to allow direct access without pairing (only safe on a trusted local network)."
  browser_cdp_port:
    name: "Browser CDP Port"
    description: "Port of the Browserless Chromium add-on (alexbelgium). Default is 3000. Change only if you configured a custom port in that add-on."
  env_vars:
    name: "Environment Variables"
    description: "Optional environment variables injected into the ZeroClaw process at startup. Use this to pass provider API keys (e.g. ANTHROPIC_API_KEY, OPENAI_API_KEY) or any custom variable your tools require."
