name: "ZeroClaw"
version: "0.6.8.7"
slug: "zeroclaw"
description: "Lightweight AI daemon with persistent memory, tools, cron scheduling, and messaging integrations"
url: "https://www.zeroclawlabs.ai"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false

options:
  timezone: UTC
  ha_mcp_enabled: false
  gateway_pairing: true

schema:
  timezone: str
  ha_mcp_enabled: bool
  gateway_pairing: bool

map:
  - share:rw
ports:
  "42617/tcp": 42617
ports_description:
  "42617/tcp": "ZeroClaw Web Dashboard"
ingress: true
ingress_port: 7681
panel_icon: mdi:robot

hassio_api: true
homeassistant_api: true
