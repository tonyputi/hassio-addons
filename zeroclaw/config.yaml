name: "ZeroClaw"
version: "0.6.5"
slug: "zeroclaw"
description: "AI daemon with tools, memory, cron, and workspace"
url: "https://www.zeroclawlabs.ai"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
options:
  provider: gemini
  api_key: ""
  model: gemini-2.0-flash
  autonomy_mode: semi
schema:
  provider: str
  api_key: password
  model: str
  autonomy_mode: list(full|semi|manual)
  telegram_token: str?
  telegram_chat_id: str?
map:
  - data
homeassistant_api: false
hassio_api: false
