slug: "zeroclaw"
description: "Lightweight AI daemon with persistent memory, tools, cron scheduling, and messaging integrations"
url: "https://www.zeroclawlabs.ai"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false

options:
  provider: gemini
  api_key: ""
  model: gemini-3.1-flash-lite-preview
  timezone: UTC
  telegram_token: ""
  telegram_allowed_users: "*"
  ha_mcp_enabled: false

schema:
  provider: list(gemini|openai|anthropic|openrouter|mistral|groq|deepseek|xai|ollama|other)
  api_key: password
  model: str
  timezone: str
  telegram_token: str
  telegram_allowed_users: str
  ha_mcp_enabled: bool

map:
  - share:rw
ingress: true
ingress_port: 42617
panel_title: ZeroClaw
panel_icon: mdi:robot

hassio_api: true
homeassistant_api: true
