configuration:
  timezone:
    name: Timezone
    description: Timezone for cron jobs (e.g. Europe/Rome)
  ha_mcp_enabled:
    name: Enable Home Assistant MCP
    description: Allow the AI agent to read and control Home Assistant entities (lights, sensors, automations) via MCP.
  browser_cdp_port:
    name: "Browser CDP Port"
    description: "Port of the Browserless Chromium add-on (alexbelgium). Default is 3000. Change only if you configured a custom port in that add-on."
  browser_stealth:
    name: "Browser Stealth Mode"
    description: "Append ?stealth=true to the Browserless CDP URL so Browserless v2 attaches puppeteer-extra-plugin-stealth to every browser session. Patches navigator.webdriver, plugins, languages, WebGL/Canvas fingerprint, and the chrome.runtime object to evade common anti-bot detection. Leave enabled unless a specific site breaks under stealth."
