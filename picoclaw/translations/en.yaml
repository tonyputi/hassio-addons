configuration:
  timezone:
    name: Timezone
    description: Timezone for cron jobs (e.g. Europe/Rome)
  ha_mcp_enabled:
    name: Enable Home Assistant MCP
    description: Allow the AI agent to read and control Home Assistant entities (lights, sensors, automations) via MCP.
  tavily_api_key:
    name: Tavily API Key (optional)
    description: >
      Better web search optimized for AI agents. Get a free key at tavily.com.
      Enables searching real websites like Booking, Airbnb, news articles, etc.
