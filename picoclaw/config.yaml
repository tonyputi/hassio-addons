name: "PicoClaw"
version: "0.2.4.8"
slug: "picoclaw"
description: "Ultra-lightweight AI agent with 30+ LLM providers and 16 messaging platforms"
url: "https://github.com/sipeed/picoclaw"
arch:
  - aarch64
  - amd64
startup: services
boot: manual
init: false

options:
  provider: gemini
  api_key: ""
  timezone: UTC
  ha_mcp_enabled: false

schema:
  provider: list(gemini|openai|anthropic|openrouter|mistral|groq|deepseek|xai|ollama|other)
  api_key: password
  timezone: str
  ha_mcp_enabled: bool

map:
  - share:rw
ports:
  "18800/tcp": 18800
ports_description:
  "18800/tcp": "PicoClaw Web UI"
panel_icon: mdi:robot-outline
