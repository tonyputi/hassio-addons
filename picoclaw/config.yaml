name: "PicoClaw"
version: "0.2.4.15"
slug: "picoclaw"
description: "Ultra-lightweight AI agent with 30+ LLM providers and 16 messaging platforms"
url: "https://github.com/sipeed/picoclaw"
arch:
  - aarch64
  - amd64
startup: services
boot: manual
init: false

options:
  timezone: UTC
  ha_mcp_enabled: false
  tavily_api_key: ""

schema:
  timezone: str
  ha_mcp_enabled: bool
  tavily_api_key: str?

map:
  - share:rw
ports:
  "18800/tcp": 18800
ports_description:
  "18800/tcp": "PicoClaw Web UI"
ingress: true
ingress_port: 7681
panel_icon: mdi:robot-outline

hassio_api: true
homeassistant_api: true
